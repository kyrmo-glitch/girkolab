version: '3.8'
services:
  mongodb:
    image: mongo
    container_name: geometry_calculator_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: geometry_user
      MONGO_INITDB_ROOT_PASSWORD: geometry_pass
      MONGO_INITDB_DATABASE: geometry_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: